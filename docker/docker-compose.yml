services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - JENKINS_ADMIN_PASSWORD=${JENKINS_ADMIN_PASSWORD}
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"      # внешний доступ для хоста (Java-тесты)
      - "9093:9093"      # внутренний доступ для контейнеров (опционально, можно не использовать)
    environment:
      # Настройка двух слушателей: INTERNAL (для контейнеров) и EXTERNAL (для хоста)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9093,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL   # брокеры общаются между собой по INTERNAL

      # Остальные настройки оставляем как есть
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    restart: unless-stopped

  zoonavigator:
    image: elkozmon/zoonavigator:latest
    container_name: zoonavigator
    ports:
      - "9090:9000"
    environment:
      HTTP_PORT: 9000
      ZOOKEEPER_HOSTS: "zookeeper:2181"
    depends_on:
      - zookeeper
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS: "kafka:9093"   # ← меняем порт на 9093
    depends_on:
      - kafka
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5433:5432"          # ← меняем 5432 на 5433
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
      image: dpage/pgadmin4:latest
      container_name: pgadmin
      ports:
        - "5050:80"
      environment:
        PGADMIN_DEFAULT_EMAIL: admin@example.com
        PGADMIN_DEFAULT_PASSWORD: admin
      depends_on:
        - postgres
      restart: unless-stopped

  wiremock:
        image: wiremock/wiremock:latest
        container_name: wiremock
        ports:
          - "8082:8080"
        volumes:
          - ./wiremock:/home/wiremock
        command: --verbose
        restart: unless-stopped

  wiremock-gui:
          image: holomekc/wiremock-gui:latest
          container_name: wiremock-gui
          ports:
            - "8083:8080"
          volumes:
            - ./wiremock:/home/wiremock
          environment:
            - JAVA_OPTS=-Dwiremock.recording.snapshotEnabled=true
          restart: unless-stopped

volumes:
  jenkins_home:
  postgres_data: